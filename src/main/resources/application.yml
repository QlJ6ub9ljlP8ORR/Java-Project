spring:
  application:
    name: authzen
  datasource:
    url: jdbc:mysql://localhost:3306/authzen?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  security:
    user:
      name: admin
      password: admin123
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    protocol: smtp
    tls: true
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  web:
    resources:
      static-locations: classpath:/static/

jwt:
  secret: this-is-a-very-long-secret-key-that-is-at-least-32-bytes-long
  access-token:
    expiry-ms: 86400000
  refresh-token:
    expiry-ms: 604800000

server:
  port: 8081

email:
  from: your-email@gmail.com

github:
  client-id: v23li0yx2HTcAAbJlWN
  client-secret: 7b670e52157b26d4573f4edcdb0df9ccab21704f
  redirect-uri: http://localhost:8081/oauth2/callback/github

admin:
  email: admin@example.com
  username: admin
  password: admin123

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true
